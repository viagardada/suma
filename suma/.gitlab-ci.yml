variables:
  CI_ADDITIONAL_TESTS:
    description: >-
      If set to "true", enable additional test jobs for Correlation
      encounter scenarios from TestGroup99.
    value: 'false'
  CI_INVALIDATE_CACHES:
    description: >-
      If set to "true", force re-download of cached build and/or runtime
      data.
    value: 'false'
  TWINE_REPOSITORY_URL:
    description: >-
      PyPI repository used for deployment with Twine.
      Typically set as a project/group variable.
  TWINE_USERNAME:
    description: >-
      Deployment PyPI repository username.
      Typically set as a project/group variable.
  TWINE_PASSWORD:
    description: >-
      Deployment PyPI repository password.
      Typically set as a project/group variable.
  GENERIC_REPOSITORY_URL:
    description: >-
      Generic repository used to download any build or runtime data as
      well as used for bare Julia deployment. Used with curl and the
      provided credentials. Must support upload via PUT method.
      Typically set as a project/group variable.
  GENERIC_USERNAME:
    description: >-
      Generic repository username.
      Typically set as a project/group variable.
  GENERIC_PASSWORD:
    description: >-
      Generic repository password.
      Typically set as a project/group variable.
  JULIA_REPOSITORY_URL:
    description: >-
      A repository used to download Julia runtime packages.
      Typically set as a project/group variable.
  PIP_EXTRA_INDEX_URL:
    description: >-
      Extra pip index URLs allowing it to install the required
      dependencies. Other pip variables may (need to) be added as well.
      Typically set as a project/group variable.
  PIP_CACHE_DIR:
    description: >-
      Cache location for pip. To speed up the job execution, runner's
      local cache directory is used by default.
    value: '/cache/pip'
  PIP_DISABLE_PIP_VERSION_CHECK:
    description: >-
      A pip customization for use in CI/CD.
    value: 'true'
  PIP_ROOT_USER_ACTION:
    description: >-
      A pip customization for use in CI/CD.
    value: ignore
  PIP_PROGRESS_BAR:
    description: >-
      A pip customization for use in CI/CD.
    value: 'off'

stages:
  - build
  - test
  - deploy

default:
  image: python:3.11  # Used instead of "slim" due curl unavailability.
  # All jobs run on x86_64 Linux, unless otherwise specified.
  tags:
    - Linux
    - x86_64

.additional_test_template: &additional_test_template
  # A template for an additional test job.
  rules:
    - if: '$CI_ADDITIONAL_TESTS =~ /true/i'

.build_template: &build_template
  # Build and pack the distribution. Keep the packaged wheel(s)/archives for tests/deployment (no lookup tables).
  stage: build
  artifacts:
    paths:
      - dist/*.whl
    # Expiration is necessary to avoid clogging GitLab server with too many artifacts.
    # If the test take too much time, expiration time can be increased.
    expire_in: 1 day

build_acas_sxu_suma:
  <<: *build_template
  script:
    - pip install -U 'apis>=3,<4'
    # The following will try to "inject" tag name as package __version__.
    - '[[ -n "${CI_COMMIT_TAG}" ]] && python -m apis inject --skip-bad-format "./suma/__init__.py" "${CI_COMMIT_TAG}"'
    # If the the distribution needs some dependencies in order to be built, install them here.
    - pip install "CASCARA>=2,<3"
    - python setup_acas_sxu_suma.py bdist_wheel

build_acas_sxu_suma_test:
  <<: *build_template
  script:
    - bash ./cache-test-suite.sh
    - mkdir -p ./suma/test/TestData
    - ln -s /cache/test_testsuite ./suma/test/TestData/test_testsuite
    - pip install -U 'apis>=3,<4'
    - '[[ -n "${CI_COMMIT_TAG}" ]] && python -m apis inject --skip-bad-format "./suma/test/__init__.py" "${CI_COMMIT_TAG}"'
    - pip install "CASCARA>=2,<3"
    - python setup_acas_sxu_suma_test.py -q bdist_wheel

build_bare_julia:
  <<: *build_template
  # Archive with only the Julia code (no lookup tables).
  script:
    - cp Example.jl ./suma/
    - cd ./suma
    - tar cvzf "../acas_sxu-suma-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA.tar.gz" ACAS_sXu Example.jl
  artifacts:
    paths:
      - acas_sxu-suma-*.tar.gz
    expire_in: 1 day

compile:
  # Try to compile everything to check if syntax is OK.
  stage: test
  script:
    - python -m compileall .
  needs: []  # Don't download any artifacts.

.install_and_test_template: &install_and_test_template
  # Install the distribution and run automated tests.
  stage: test
  image: caffeine.azurecr.io/tcas-evolution/julia-interpreter:3.11-1.0.5
  variables:
    EXTRAS: ''
  before_script:
    # Move to a clean directory.
    # Virtual environment doesn't have to be created since this job is expected to run via
    # a Docker executor, discarding the container afterwards.
    - mkdir sandbox
    - cd sandbox
    # The following line is used to install a specific .whl files made during the build phase.
    # Add any extras specification, if necessary.
    - for wheel in ../dist/acas_sxu_suma-*.whl; do pip install "${wheel}${EXTRAS}"; done
    - for wheel in ../dist/acas_sxu_suma_test-*.whl; do pip install "${wheel}"; done
    - bash ../cache-lookup-tables.sh
    - export SUMA_PARAMS_FILE="/cache/LookupTables/DO-396_paramsfile_acassxu_origami_20220908.txt"
  artifacts:
    paths:
      # Test output details may be put into a file to avoid producing too much output
      # (the job may fail because of that).
      - install_and_test_*.txt
    when: on_failure
    expire_in: 2 days
  needs:
    - build_acas_sxu_suma
    - build_acas_sxu_suma_test

# NOTE: Unittest lists need to be updated when differently named tests are added.

install_and_test_1_and_2_and_3:
  <<: *install_and_test_template
  script:
    - python -m unittest -v -k 'Encounter1' -k 'Encounter2' -k 'Encounter3' suma.test.TestSuiteTest
      2>&1 | tee ../$CI_JOB_NAME.txt | grep -E '^(Ran|FAILED|OK|ERROR)| \.\.\. (ok|FAIL|skipped)'


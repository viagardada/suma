install_and_test_example:
  <<: *install_and_test_template
  script:
    - mkdir example
    - cp ../example/*.json ../example/*.yml ../example/*.py example/
    - python -m unittest -v suma.test.ExampleTest
  artifacts: null

test_bare_julia:
  stage: test
  image: caffeine.azurecr.io/tcas-evolution/julia-interpreter:3.11-1.0.5
  script:
    - bash ./cache-lookup-tables.sh
    - mkdir sandbox
    - tar -zxvf acas_sxu-suma-*.tar.gz -C sandbox
    - cd sandbox
    - ln -s /cache/LookupTables ./LookupTables
    - julia Example.jl
  needs:
    - build_bare_julia

deploy:
  # Deploy the distributions to PyPI and generic repositories.
  stage: deploy
  variables:
    GIT_STRATEGY: none  # Repo contents are not needed.
  script:
    - pip install twine
    - twine upload --non-interactive --disable-progress-bar dist/*
    - for pack in acas_sxu-suma-*.tar.gz; do
      curl -Lfs -u "${GENERIC_USERNAME}:${GENERIC_PASSWORD}" -X PUT "${GENERIC_REPOSITORY_URL}/suma/julia/${pack}" -T "${pack}";
      done
  rules:  &only_release
    # Deployment is executed only for tags named with PEP 440 canonical version numbers.
    - if: $CI_COMMIT_TAG =~ /^([1-9]\d*!)?(0|[1-9]\d*)(\.(0|[1-9]\d*))*((a|b|rc)(0|[1-9]\d*))?(\.post(0|[1-9]\d*))?(\.dev(0|[1-9]\d*))?$/

.build_and_deploy_bundle_template: &build_and_deploy_bundle_template
  # Create and deploy a convenient bundle with Julia, code and data.
  # All done in one step due to large artifact size.
  stage: deploy
  variables:
    PLATFORM: 'linux_x86_64'
    JULIA_PACKAGE: 'julia-docker-1.0.5-linux-x86_64.tar.gz'
    # The depot has been made on Windows, but doesn't contain any
    # platform-specific packages.
    JULIA_DEPOT: 'julia-pycall_json_depot-1.0.5-win64.tar.gz'
  script:
    # Build.
    - bash ./cache-lookup-tables.sh
    - curl -Lfs "${JULIA_REPOSITORY_URL}/${JULIA_PACKAGE}" -o julia.tar.gz
    - curl -Lfs "${JULIA_REPOSITORY_URL}/${JULIA_DEPOT}" -o julia-depot.tar.gz
    - mkdir acas_sxu_bundle
    - cd acas_sxu_bundle
    - tar xf ../acas_sxu-suma-*.tar.gz
    - cp -r /cache/LookupTables ./LookupTables
    - rm ./LookupTables/sUMA_*
    - mkdir julia
    - tar xf ../julia.tar.gz -C julia
    - tar xf ../julia-depot.tar.gz -C julia
    - cd ..
    - BUNDLE_NAME="acas_sxu-suma-bundle-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}-${PLATFORM}.tar.gz"
    - tar czf "${BUNDLE_NAME}" acas_sxu_bundle
    # Test.
    - cd acas_sxu_bundle
    - export JULIA_DEPOT_PATH="$(pwd)/julia/depot"
    - ./julia/bin/julia Example.jl
    - cd ..
    # Deploy.
    - curl -Lfs -u "${GENERIC_USERNAME}:${GENERIC_PASSWORD}" -X PUT "${GENERIC_REPOSITORY_URL}/suma/julia/${BUNDLE_NAME}" -T "${BUNDLE_NAME}"
  rules:
    # Deployment is executed only for tags named with PEP 440 canonical version numbers or manually.
    - if: $CI_COMMIT_TAG =~ /^([1-9]\d*!)?(0|[1-9]\d*)(\.(0|[1-9]\d*))*((a|b|rc)(0|[1-9]\d*))?(\.post(0|[1-9]\d*))?(\.dev(0|[1-9]\d*))?$/
    - if: $CI_COMMIT_BRANCH
      when: manual
      allow_failure: true
  needs:
    - build_bare_julia

build_and_deploy_bundle:
  <<: *build_and_deploy_bundle_template

build_and_deploy_bundle_aarch64:
  <<: *build_and_deploy_bundle_template
  variables:
    PLATFORM: 'linux_aarch64'
    JULIA_PACKAGE: 'julia-docker-1.0.5-linux-aarch64.tar.gz'
    JULIA_DEPOT: 'julia-pycall_json_depot-1.0.5-win64.tar.gz'
  tags:
    - Linux
    - ARMv8

build_and_deploy_bundle_win:
  <<: *build_and_deploy_bundle_template
  variables:
    PLATFORM: 'win_amd64'
    JULIA_PACKAGE: 'julia-1.0.5-win64.tar.gz'
    JULIA_DEPOT: 'julia-pycall_json_depot-1.0.5-win64.tar.gz'
  script:
    # Build.
    - ./cache-lookup-tables.ps1
    - curl.exe -Lfs "${env:JULIA_REPOSITORY_URL}/${env:JULIA_PACKAGE}" -o julia.tar.gz
    - curl.exe -Lfs "${env:JULIA_REPOSITORY_URL}/${env:JULIA_DEPOT}" -o julia-depot.tar.gz
    - mkdir acas_sxu_bundle
    - cd acas_sxu_bundle
    - ls ../acas_sxu-suma-*.tar.gz | %{ tar xf $_ }
    - cp -r C:/cache/LookupTables ./LookupTables
    - rm ./LookupTables/sUMA_*
    - mkdir julia
    - tar xf ../julia.tar.gz -C julia
    - tar xf ../julia-depot.tar.gz -C julia
    - cd ..
    - $BUNDLE_NAME = "acas_sxu-suma-bundle-${env:CI_COMMIT_REF_SLUG}-${env:CI_COMMIT_SHORT_SHA}-${env:PLATFORM}.tar.gz"
    - tar czf "${BUNDLE_NAME}" acas_sxu_bundle
    # Test.
    - cd acas_sxu_bundle
    - $env:JULIA_DEPOT_PATH = "$(pwd)/julia/depot"
    - ./julia/bin/julia Example.jl
    - cd ..
    # Deploy.
    - curl.exe -Lfs -u "${env:GENERIC_USERNAME}:${env:GENERIC_PASSWORD}" -X PUT "${env:GENERIC_REPOSITORY_URL}/suma/julia/${BUNDLE_NAME}" -T "${BUNDLE_NAME}"
  tags:
    - Windows
    - amd64
